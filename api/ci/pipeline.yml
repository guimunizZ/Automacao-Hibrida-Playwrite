name: Barbearia Muniz QA Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  preview-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run preview smoke suite
        run: mvn -B test -Denv=preview -Dcucumber.filter.tags=@smoke
        working-directory: qa-barbershop-automation

  preview-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run preview regression gate
        run: mvn -B test -Denv=preview
        working-directory: qa-barbershop-automation

  production-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run production regression gate
        run: mvn -B test -Denv=production
        working-directory: qa-barbershop-automation
